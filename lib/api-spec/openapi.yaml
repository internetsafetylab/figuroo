openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Figuroo Dashboard API - 3D printed figurine order management
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: orders
    description: Order management
  - name: products
    description: Product management
  - name: inventory
    description: Filament inventory management
  - name: analytics
    description: Analytics and dashboard summaries

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Orders ────────────────────────────────────────────────────────────────
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    delete:
      operationId: deleteOrder
      tags: [orders]
      summary: Delete an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ── Products ──────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Inventory ─────────────────────────────────────────────────────────────
  /inventory:
    get:
      operationId: listInventory
      tags: [inventory]
      summary: List all inventory items
      responses:
        "200":
          description: List of inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"
    post:
      operationId: createInventoryItem
      tags: [inventory]
      summary: Create a new inventory item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryInput"
      responses:
        "201":
          description: Created inventory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /inventory/{id}:
    patch:
      operationId: updateInventoryItem
      tags: [inventory]
      summary: Update an inventory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryUpdate"
      responses:
        "200":
          description: Updated inventory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
    delete:
      operationId: deleteInventoryItem
      tags: [inventory]
      summary: Delete an inventory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Analytics / Wow endpoints ─────────────────────────────────────────────
  /analytics/summary:
    get:
      operationId: getDashboardSummary
      tags: [analytics]
      summary: Dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /analytics/revenue:
    get:
      operationId: getRevenueChart
      tags: [analytics]
      summary: Monthly revenue and profit data for charts
      responses:
        "200":
          description: Revenue chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueDataPoint"

  /analytics/top-products:
    get:
      operationId: getTopProducts
      tags: [analytics]
      summary: Best selling products by order count
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

  /analytics/deadlines:
    get:
      operationId: getUpcomingDeadlines
      tags: [analytics]
      summary: Orders with upcoming or overdue deadlines
      responses:
        "200":
          description: Upcoming deadlines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /analytics/courier-stats:
    get:
      operationId: getCourierStats
      tags: [analytics]
      summary: Order count and revenue grouped by courier
      responses:
        "200":
          description: Courier statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourierStat"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Order schemas ────────────────────────────────────────────────────────
    Order:
      type: object
      required:
        - id
        - customer_name
        - product_name
        - status
        - created_at
      properties:
        id:
          type: integer
        customer_name:
          type: string
        product_name:
          type: string
        product_color:
          type: ["string", "null"]
        material:
          type: ["string", "null"]
        order_price:
          type: ["number", "null"]
        shipping_price:
          type: ["number", "null"]
        filament_cost:
          type: ["number", "null"]
        profit:
          type: ["number", "null"]
        courier:
          type: ["string", "null"]
        awb_code:
          type: ["string", "null"]
        easybox_qr_image_url:
          type: ["string", "null"]
        status:
          type: string
          enum: [Pending, Printing, Packaging, "Ready to Ship", Shipped, Delivered]
        deadline:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        created_at:
          type: string

    OrderInput:
      type: object
      required:
        - customer_name
        - product_name
      properties:
        customer_name:
          type: string
        product_name:
          type: string
        product_color:
          type: string
        material:
          type: string
        order_price:
          type: number
        shipping_price:
          type: number
        filament_cost:
          type: number
        courier:
          type: string
        awb_code:
          type: string
        easybox_qr_image_url:
          type: string
        status:
          type: string
        deadline:
          type: string
        notes:
          type: string

    OrderUpdate:
      type: object
      properties:
        customer_name:
          type: string
        product_name:
          type: string
        product_color:
          type: string
        material:
          type: string
        order_price:
          type: number
        shipping_price:
          type: number
        filament_cost:
          type: number
        courier:
          type: string
        awb_code:
          type: string
        easybox_qr_image_url:
          type: string
        status:
          type: string
        deadline:
          type: string
        notes:
          type: string

    OrderStatusUpdate:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [Pending, Printing, Packaging, "Ready to Ship", Shipped, Delivered]

    # ── Product schemas ──────────────────────────────────────────────────────
    Product:
      type: object
      required:
        - id
        - name
        - created_at
      properties:
        id:
          type: integer
        name:
          type: string
        filament_used_grams:
          type: ["number", "null"]
        default_price:
          type: ["number", "null"]
        image_url:
          type: ["string", "null"]
        created_at:
          type: string

    ProductInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        filament_used_grams:
          type: number
        default_price:
          type: number
        image_url:
          type: string

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        filament_used_grams:
          type: number
        default_price:
          type: number
        image_url:
          type: string

    # ── Inventory schemas ────────────────────────────────────────────────────
    InventoryItem:
      type: object
      required:
        - id
        - filament_name
        - created_at
      properties:
        id:
          type: integer
        filament_name:
          type: string
        color:
          type: ["string", "null"]
        grams_left:
          type: ["number", "null"]
        cost_per_kg:
          type: ["number", "null"]
        low_stock_threshold:
          type: ["number", "null"]
        created_at:
          type: string

    InventoryInput:
      type: object
      required:
        - filament_name
      properties:
        filament_name:
          type: string
        color:
          type: string
        grams_left:
          type: number
        cost_per_kg:
          type: number
        low_stock_threshold:
          type: number

    InventoryUpdate:
      type: object
      properties:
        filament_name:
          type: string
        color:
          type: string
        grams_left:
          type: number
        cost_per_kg:
          type: number
        low_stock_threshold:
          type: number

    # ── Analytics schemas ────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required:
        - total_orders
        - orders_today
        - monthly_revenue
        - monthly_profit
        - active_shipments
        - pending_orders
        - delivered_orders
        - low_stock_count
      properties:
        total_orders:
          type: integer
        orders_today:
          type: integer
        monthly_revenue:
          type: number
        monthly_profit:
          type: number
        active_shipments:
          type: integer
        pending_orders:
          type: integer
        delivered_orders:
          type: integer
        low_stock_count:
          type: integer

    RevenueDataPoint:
      type: object
      required:
        - month
        - revenue
        - profit
      properties:
        month:
          type: string
        revenue:
          type: number
        profit:
          type: number
        order_count:
          type: integer

    TopProduct:
      type: object
      required:
        - product_name
        - order_count
      properties:
        product_name:
          type: string
        order_count:
          type: integer
        total_revenue:
          type: number

    CourierStat:
      type: object
      required:
        - courier
        - order_count
      properties:
        courier:
          type: string
        order_count:
          type: integer
        total_revenue:
          type: number
