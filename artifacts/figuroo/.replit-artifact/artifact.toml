kind = "web"
previewPath = "/"
title = "Figuroo Dashboard"
version = "1.0.0"
id = "artifacts/figuroo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19435

[services.development]
run = "pnpm --filter @workspace/figuroo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/figuroo", "run", "build" ]
publicDir = "artifacts/figuroo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19435"
BASE_PATH = "/"
